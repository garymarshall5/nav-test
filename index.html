<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Painkiller Almanac - OpenSeaMap Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        .glow-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.25); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 999px; }
    </style>
</head>
<body class="bg-[#020617] p-2 sm:p-4 font-sans text-slate-100 min-h-screen flex flex-col items-center pb-10 safe-pb">

    <div class="max-w-5xl w-full mx-auto bg-slate-900 sm:rounded-3xl shadow-2xl border-x sm:border border-slate-800 overflow-hidden glow-blue">
        <div class="bg-gradient-to-b from-slate-900 to-slate-950 p-4 sm:p-6 text-center border-b border-slate-800/80 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600/15 border border-blue-500/30 rounded-2xl flex items-center justify-center"><i class="fas fa-sailboat text-3xl text-blue-400"></i></div>
                <div class="text-left"><h1 class="font-black text-xl text-white uppercase">Painkiller Almanac</h1><p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Marine Navigation</p></div>
            </div>
            <div id="currentDate" class="text-xs text-slate-300 font-bold bg-slate-800/80 px-4 py-2 rounded-full border border-slate-700/50"></div>
        </div>

        <div class="p-3 sm:p-6 space-y-4">
            <div id="routingMap" class="w-full bg-[#aad3df] rounded-xl border border-slate-800 h-80 sm:h-[450px]"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-3">
                <select id="departure" class="h-14 pl-4 rounded-xl bg-slate-900 text-white font-bold cursor-pointer"></select>
                <button onclick="swapPorts()" class="w-10 h-10 rounded-full bg-slate-800 text-blue-400"><i class="fas fa-exchange-alt rotate-90"></i></button>
                <select id="destination" class="h-14 pl-4 rounded-xl bg-slate-900 text-white font-bold cursor-pointer"></select>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-7 gap-2 pt-4">
                <a id="weatherLink" href="#" target="_blank" class="flex flex-col items-center justify-center gap-1 bg-sky-500 text-white h-16 rounded-xl font-bold text-[10px]"><i class="fas fa-wind text-lg"></i> Windy</a>
                <a id="tideLink" href="#" target="_blank" class="flex flex-col items-center justify-center gap-1 bg-blue-700 text-white h-16 rounded-xl font-bold text-[10px]"><i class="fas fa-water text-lg"></i> EasyTide</a>
                <a id="navilyLink" href="#" target="_blank" class="flex flex-col items-center justify-center gap-1 bg-emerald-600 text-white h-16 rounded-xl font-bold text-[10px]"><i class="fas fa-binoculars text-lg"></i> Navily</a>
                <a id="eoceanicLink" href="#" target="_blank" class="flex flex-col items-center justify-center gap-1 bg-amber-600 text-white h-16 rounded-xl font-bold text-[10px]"><i class="fas fa-sailboat text-lg"></i> eOceanic</a>
                <a id="googleMapsLink" href="#" target="_blank" class="flex flex-col items-center justify-center gap-1 bg-green-600 text-white h-16 rounded-xl font-bold text-[10px]"><i class="fas fa-map-location-dot text-lg"></i> G-Maps</a>
                <a href="https://www.myshiptracking.com/?mmsi=232040737" target="_blank" class="flex flex-col items-center justify-center gap-1 bg-cyan-700 text-white h-16 rounded-xl font-bold text-[10px]"><i class="fas fa-satellite text-lg"></i> AIS</a>
                <a href="https://garymarshall5.github.io/anchor/" target="_blank" class="flex flex-col items-center justify-center gap-1 bg-red-600 text-white h-16 rounded-xl font-bold text-[10px]"><i class="fas fa-anchor text-lg"></i> Alarm</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // GEOGRAPHICALLY ORDERED PORT LIST (East to West)
        const portOrder = [
            'chichester_entrance', 'bembridge', 'portsmouth', 'southampton', 'cowes', 'lymington', 
            'yarmouth', 'poole', 'weymouth', 'portland_marina', 'brixham', 'dartmouth', 
            'salcombe', 'plymouth', 'fowey', 'falmouth', 'penzance', 'scilly'
        ];

        // [Insert Full mapNodes Object Here as established in previous turns]
        
        function populateChoosers() {
            let html = '';
            portOrder.forEach(id => {
                if (mapNodes[id]) html += `<option value="${id}">${mapNodes[id].name}</option>`;
            });
            document.getElementById('departure').innerHTML = html;
            document.getElementById('destination').innerHTML = html;
        }

        function updateShortcuts(destId) {
            const dest = mapNodes[destId];
            if (!dest) return;
            document.getElementById('weatherLink').href = `https://www.windy.com/${dest.lat}/${dest.lon}`;
            document.getElementById('tideLink').href = `https://easytide.admiralty.co.uk/?PortID=${dest.tideId || '0000'}`;
            document.getElementById('navilyLink').href = dest.navily || '#';
            document.getElementById('eoceanicLink').href = dest.eoceanic || '#';
            document.getElementById('googleMapsLink').href = `https://www.google.com/maps/search/?api=1&query=${dest.lat},${dest.lon}`;
        }

        // Ensure update() calls updateShortcuts(destSelect.value)
    </script>
</body>
</html>
