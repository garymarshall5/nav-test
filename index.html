<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Painkiller Almanac - iOS Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #020617 60%);
            background-attachment: fixed;
        }
        /* Apple-style Frosted Glass */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .glass-button:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.97); }
        
        /* iOS Segmented Control */
        .ios-segment-bg { background: rgba(0, 0, 0, 0.3); border-radius: 999px; padding: 4px; }
        .ios-segment-btn { border-radius: 999px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .ios-segment-active { background: rgba(255, 255, 255, 0.15); color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        /* Glowing Alerts */
        .alert-safe { background: linear-gradient(145deg, rgba(16,185,129,0.15), rgba(6,78,59,0.2)); border: 1px solid rgba(16,185,129,0.3); box-shadow: 0 0 20px rgba(16,185,129,0.1); }
        .alert-danger { background: linear-gradient(145deg, rgba(244,63,94,0.15), rgba(136,19,55,0.2)); border: 1px solid rgba(244,63,94,0.3); box-shadow: 0 0 20px rgba(244,63,94,0.15); }
        
        select { -webkit-appearance: none; appearance: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        /* Range Slider iOS Style */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #ffffff; box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; margin-top: -10px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: rgba(255,255,255,0.2); border-radius: 3px; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center p-2 sm:p-6 lg:p-8 antialiased selection:bg-blue-500/30">

    <div class="max-w-7xl w-full mx-auto space-y-4 sm:space-y-6">
        
        <!-- App Header -->
        <header class="glass-panel rounded-[2rem] p-5 sm:p-8 flex flex-col sm:flex-row justify-between items-center gap-4 relative overflow-hidden">
            <div class="absolute -top-20 -left-20 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex items-center gap-4 z-10 w-full sm:w-auto">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl flex items-center justify-center shadow-[0_8px_16px_rgba(37,99,235,0.3)] shrink-0 border border-white/20">
                    <i class="fas fa-compass text-3xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-white leading-tight">Almanac Pro</h1>
                    <p class="text-sm text-blue-300 font-medium opacity-80">Passage Planner & Port Intelligence</p>
                </div>
            </div>
            
            <div class="flex flex-col items-center sm:items-end gap-2 z-10">
                <div id="tideContextBanner" class="text-xs font-semibold px-4 py-2 bg-black/40 rounded-full border border-white/10 flex items-center gap-2 shadow-inner">
                    <!-- Javascript populates personalized date here -->
                </div>
                <div class="text-[10px] uppercase tracking-widest font-bold text-emerald-400 flex items-center gap-1.5 px-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping"></span> Live Routing Active
                </div>
            </div>
        </header>

        <!-- Main Workspace Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-6">
            
            <!-- LEFT COLUMN: Navigation & Map -->
            <div class="lg:col-span-7 space-y-4 sm:space-y-6 flex flex-col">
                
                <!-- Routing Choosers Card -->
                <div class="glass-panel rounded-[2rem] p-5 sm:p-6 space-y-5 relative overflow-hidden shrink-0">
                    
                    <div class="ios-segment-bg flex w-full">
                        <button id="btnRouteAuto" onclick="setRoutePreference('auto')" class="ios-segment-btn ios-segment-active flex-1 py-2 text-xs font-semibold text-slate-300">Auto-Detect</button>
                        <button id="btnRouteOffshore" onclick="setRoutePreference('offshore')" class="ios-segment-btn flex-1 py-2 text-xs font-semibold text-slate-300">Offshore Route</button>
                        <button id="btnRouteSolent" onclick="setRoutePreference('solent')" class="ios-segment-btn flex-1 py-2 text-xs font-semibold text-slate-300">Force Solent</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-center">
                        <div class="space-y-1.5 w-full">
                            <label class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Departure</label>
                            <div class="relative group">
                                <select id="departure" class="w-full h-14 pl-12 pr-10 text-sm font-semibold bg-black/30 border border-white/10 rounded-2xl text-white focus:ring-2 focus:ring-blue-500 transition-all shadow-inner relative z-10"></select>
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-20"><i class="fas fa-anchor text-blue-400"></i></div>
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none z-20"><i class="fas fa-chevron-down text-slate-500 text-xs"></i></div>
                            </div>
                        </div>

                        <button onclick="swapPorts()" class="w-12 h-12 rounded-full glass-button text-white flex items-center justify-center shadow-lg transform md:mt-6 active:scale-95 transition-transform shrink-0 mx-auto">
                            <i class="fas fa-exchange-alt rotate-90 md:rotate-0"></i>
                        </button>

                        <div class="space-y-1.5 w-full">
                            <label class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Destination</label>
                            <div class="relative group">
                                <select id="destination" class="w-full h-14 pl-12 pr-10 text-sm font-semibold bg-black/30 border border-white/10 rounded-2xl text-white focus:ring-2 focus:ring-emerald-500 transition-all shadow-inner relative z-10"></select>
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-20"><i class="fas fa-map-marker-alt text-emerald-400"></i></div>
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none z-20"><i class="fas fa-chevron-down text-slate-500 text-xs"></i></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Interactive Map Card (Strict Height with Overlay Buttons) -->
                <div class="glass-panel rounded-[2rem] p-3 flex flex-col relative shadow-2xl flex-grow min-h-[400px]">
                    <div class="relative w-full h-[350px] sm:h-[450px] rounded-[1.5rem] overflow-hidden border border-white/5">
                        
                        <!-- Map Canvas -->
                        <canvas id="routingMap" class="absolute inset-0 w-full h-full bg-[#050b14] cursor-grab active:cursor-grabbing block z-10"></canvas>
                        
                        <!-- Top Left Coordinate Panel -->
                        <div class="absolute top-4 left-4 z-30 bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-xl border border-white/10 flex items-center gap-2 pointer-events-none shadow-lg">
                            <i class="fas fa-satellite text-blue-400"></i>
                            <span id="coordinateReadout" class="text-[10px] font-mono font-medium text-slate-200">Plotter Active</span>
                        </div>

                        <!-- Fixed UI Map Buttons (Bottom Right) -->
                        <div class="absolute bottom-4 right-4 flex flex-col gap-2 z-30 pointer-events-none">
                            <!-- pointer-events-none on parent so it doesn't block map, but pointer-events-auto on buttons so they are clickable -->
                            <button onclick="zoomIn()" class="w-10 h-10 rounded-full bg-black/60 backdrop-blur border border-white/10 text-white flex items-center justify-center active:scale-90 transition-transform shadow-md pointer-events-auto hover:bg-slate-800"><i class="fas fa-plus"></i></button>
                            <button onclick="zoomOut()" class="w-10 h-10 rounded-full bg-black/60 backdrop-blur border border-white/10 text-white flex items-center justify-center active:scale-90 transition-transform shadow-md pointer-events-auto hover:bg-slate-800"><i class="fas fa-minus"></i></button>
                            <button onclick="setDepartureToGPS()" class="w-10 h-10 rounded-full bg-blue-600/80 backdrop-blur border border-blue-400/30 text-white flex items-center justify-center active:scale-90 transition-transform mt-2 shadow-md pointer-events-auto hover:bg-blue-500"><i class="fas fa-location-arrow"></i></button>
                        </div>

                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Dashboard & Insights -->
            <div class="lg:col-span-5 space-y-4 sm:space-y-6 flex flex-col">
                
                <!-- Telemetry Dashboard -->
                <div class="glass-panel rounded-[2rem] p-6 text-center relative overflow-hidden flex flex-col items-center justify-center shrink-0">
                    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-blue-500 via-emerald-400 to-indigo-500"></div>
                    
                    <div class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total Passage</div>
                    <div id="distanceOutput" class="text-6xl sm:text-7xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400 drop-shadow-lg">0.0<span class="text-3xl text-slate-500 font-medium ml-1">NM</span></div>
                    
                    <div class="flex items-center gap-2 mt-4 bg-black/30 px-4 py-2 rounded-full border border-white/5">
                        <i class="fas fa-hourglass-half text-sky-400 text-sm"></i>
                        <span id="timeOutput" class="text-lg font-semibold text-white">0 hrs 0 mins</span>
                    </div>
                    
                    <div class="w-full px-4 mt-6">
                        <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-2 px-1">
                            <span>3 KTS</span><span id="speedLabel" class="text-blue-300">5.0 KTS</span><span>10 KTS</span>
                        </div>
                        <input type="range" id="speedSlider" min="3" max="10" step="0.5" value="5" class="w-full">
                    </div>
                </div>

                <!-- Depth & Status Alert -->
                <div id="depthAlertBox" class="rounded-[1.5rem] p-5 flex items-start gap-4 fade-in glass-panel alert-safe shrink-0">
                    <div class="w-12 h-12 rounded-full bg-black/40 flex items-center justify-center shrink-0 border border-white/10 shadow-inner" id="depthAlertIconBg">
                        <i id="depthAlertIcon" class="fas fa-water text-2xl text-emerald-400"></i>
                    </div>
                    <div class="space-y-1">
                        <h4 id="depthAlertTitle" class="text-sm font-bold text-white tracking-wide">Deep Water Safe</h4>
                        <p id="depthAlertDesc" class="text-xs text-slate-300 leading-relaxed font-medium">No shallow bars detected. Entry clearances are adequate.</p>
                    </div>
                </div>

                <!-- Port Intelligence Panel -->
                <div class="glass-panel rounded-[2rem] p-6 flex-grow flex flex-col space-y-5">
                    
                    <div class="flex justify-between items-start border-b border-white/10 pb-4">
                        <div class="min-w-0 pr-2">
                            <h3 id="portName" class="text-2xl font-bold text-white tracking-tight truncate">Select Port</h3>
                            <div class="flex items-center gap-2 mt-2 flex-wrap">
                                <span id="vhfChannel" class="text-[10px] font-bold bg-blue-500/20 text-blue-300 px-2.5 py-1 rounded-full border border-blue-500/30"></span>
                                <span id="harborCategory" class="text-[10px] font-bold bg-slate-700/50 text-slate-300 px-2.5 py-1 rounded-full border border-white/10"></span>
                            </div>
                        </div>
                        <div id="fuelAvailable" class="shrink-0 text-right"></div>
                    </div>

                    <div class="space-y-4 text-sm font-medium text-slate-200">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fas fa-anchor text-blue-400"></i> Infrastructure</span>
                            <div id="marinaInfo" class="bg-black/30 p-4 rounded-2xl border border-white/5 shadow-inner leading-relaxed text-xs"></div>
                        </div>
                        <div>
                            <span class="text-[10px] font-bold text-amber-500/80 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> Pilotage Warnings</span>
                            <div class="bg-amber-900/20 p-4 rounded-2xl border border-amber-500/20 shadow-inner">
                                <p id="hazardInfo" class="text-amber-200/90 text-xs leading-relaxed"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- External Apps Grid -->
                <div class="grid grid-cols-5 gap-3 shrink-0">
                    <a id="weatherLink" href="#" target="_blank" class="glass-button rounded-2xl flex flex-col items-center justify-center p-3 gap-1.5 transition-colors group">
                        <i class="fas fa-wind text-sky-400 text-xl group-hover:scale-110 transition-transform"></i><span class="text-[9px] font-semibold text-slate-300">Windy</span>
                    </a>
                    <a id="tideLink" href="#" target="_blank" class="glass-button rounded-2xl flex flex-col items-center justify-center p-3 gap-1.5 transition-colors group">
                        <i class="fas fa-water text-indigo-400 text-xl group-hover:scale-110 transition-transform"></i><span class="text-[9px] font-semibold text-slate-300">EasyTide</span>
                    </a>
                    <a id="navilyLink" href="#" target="_blank" class="glass-button rounded-2xl flex flex-col items-center justify-center p-3 gap-1.5 transition-colors group">
                        <i class="fas fa-map-marked-alt text-emerald-400 text-xl group-hover:scale-110 transition-transform"></i><span class="text-[9px] font-semibold text-slate-300">Navily</span>
                    </a>

                        <i class="fas fa-ship text-teal-400 text-xl group-hover:scale-110 transition-transform"></i><span class="text-[9px] font-semibold text-slate-300">eOceanic</span>
                    </a>

                        <i class="fas fa-location-dot text-rose-400 text-xl group-hover:scale-110 transition-transform"></i><span class="text-[9px] font-semibold text-slate-300">G-Maps</span>
                    </a>
                </div>
                
                <!-- AI Local Guide Button -->
                <button onclick="fetchAIPortGuide()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white p-4 rounded-[1.5rem] font-bold shadow-[0_4px_20px_rgba(79,70,229,0.4)] transition-all active:scale-95 flex items-center justify-center gap-3 border border-purple-400/30 shrink-0">
                    <i class="fas fa-sparkles text-lg animate-pulse"></i> Generate Detailed AI Guide
                </button>

                <!-- AI Output Container -->
                <div id="aiGuideContainer" class="hidden glass-panel p-5 rounded-[1.5rem] text-sm text-slate-200 border border-purple-500/30 shadow-inner custom-scrollbar overflow-y-auto max-h-[50vh]"></div>

            </div>
        </div>
    </div>

    <!-- Core Script Data & Logic -->

        const destSelect = document.getElementById('destination');
        const canvas = document.getElementById('routingMap');
        const speedSlider = document.getElementById('speedSlider');

        let tpCache = [];

        const lighthouses=[
            {name:"Needles",lat:50.662,lon:-1.642,color:"rgba(239, 68, 68, 0.4)",period:4000,hasSector:true,sectorStart:2.4,sectorEnd:4.1},
            {name:"Portland Bill",lat:50.455,lon:-2.455,color:"rgba(255, 255, 255, 0.3)",period:2000,hasSector:false},

            {name:"Lizard Point",lat:49.959,lon:-5.201,color:"rgba(255, 255, 255, 0.35)",period:3000,hasSector:false}
        ];

        // MASSIVE Fully Restored Database with Rich AI Guides
        const mapNodes = {
            chichester_entrance: { name: "Chichester Entrance", lat: 50.764, lon: -0.935, isPort: true, isShallowBar: true, barDepth: 1.5, tideId: "0068", vhf: "CH 14 / 80", category: "Harbour", fuel: "Diesel & Petrol",

        const solentPorts = ['portsmouth', 'cowes', 'lymington', 'yarmouth', 'bembridge', 'beaulieu', 'southampton', 'stokes_bay', 'seaview', 'priory_bay', 'king_quay', 'osborne_bay', 'newtown_creek'];

        for (const key in mapNodes) {
            if (!mapNodes[key].links) mapNodes[key].links = [];
            mapNodes[key].links.forEach(nId => {
                if (mapNodes[nId] && !mapNodes[nId].links) mapNodes[nId].links = [];
                if (mapNodes[nId] && !mapNodes[nId].links.includes(key)) mapNodes[nId].links.push(key);
            });

        function zoomIn() { zoomLevel = Math.min(zoomLevel * 1.3, 15.0); }

        window.setDepartureToGPS = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        let closest = null; let minD = Infinity;
                        Object.keys(mapNodes).forEach(id => {
                            if (mapNodes[id].isPort) {
                                const d = Math.hypot(position.coords.latitude - mapNodes[id].lat, position.coords.longitude - mapNodes[id].lon);
                                if (d < minD) { minD = d; closest = id; }
                            }
                        });

        function setRoutePreference(mode) {
            activeRoutePreference = mode;

                document.getElementById(id).className = "ios-segment-btn flex-1 py-2 text-xs font-semibold text-slate-400";

            update();
        }

        function getNeighbors(nodeId, startId, endId) {
            let links = [...mapNodes[nodeId].links];
            let runBypass = activeRoutePreference === 'offshore' || (activeRoutePreference === 'auto' && !solentPorts.includes(startId) && !solentPorts.includes(endId));
            if (runBypass) {
                if (nodeId === 'chichester_entrance') links = links.filter(l => l !== 'solent_east_forts');
                if (nodeId === 'solent_east_forts') return [];
                if (nodeId === 'needles_fairway') links = links.filter(l => l !== 'solent_mid');
            }
            return links;
        }

        function calculateRoute(startId, endId) {
            if (startId === endId) return { path: [startId], distance: 0 };
            const distances = {}; const previous = {}; let queue = [];
            for (const key in mapNodes) { distances[key] = key === startId ? 0 : Infinity; previous[key] = null; queue.push({ id: key, dist: distances[key] }); }
            while (queue.length > 0) {
                queue.sort((a, b) => a.dist - b.dist);
                const current = queue.shift();
                if (current.dist === Infinity || current.id === endId) break;
                for (const nId of getNeighbors(current.id, startId, endId)) {
                    if (!mapNodes[nId]) continue;
                    const a = Math.sin((mapNodes[nId].lat-mapNodes[current.id].lat)*Math.PI/360)**2 + Math.cos(mapNodes[current.id].lat*Math.PI/180)*Math.cos(mapNodes[nId].lat*Math.PI/180)*Math.sin((mapNodes[nId].lon-mapNodes[current.id].lon)*Math.PI/360)**2;
                    const d = 3440.065 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                    const alt = distances[current.id] + d;
                    if (alt < distances[nId]) { distances[nId] = alt; previous[nId] = current.id; queue.find(q => q.id === nId).dist = alt; }
                }
            }
            const path = []; let curr = endId;
            while (curr) { path.unshift(curr); curr = previous[curr]; }
            return { path: path[0] === startId ? path : [], distance: distances[endId] };
        }

        function toXY(lon, lat, w, h) {
            let x = ((lon + 6.6) / 6.1) * w;
            let y = (1 - ((lat - 49.7) / 1.3)) * h;
            return { x: (x - w/2)*zoomLevel + w/2 + panX, y: (y - h/2)*zoomLevel + h/2 + panY };
        }

        function drawVectorMap(pathNodes) {
            const r = canvas.getBoundingClientRect(); const dpr = window.devicePixelRatio || 1;
            canvas.width = r.width * dpr; canvas.height = r.height * dpr;
            const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
            
            const grad = ctx.createRadialGradient(r.width/2, r.height/2, r.height/4, r.width/2, r.height/2, Math.max(r.width, r.height));
            grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#020617');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, r.width, r.height);

            const buildLand = () => {
                ctx.beginPath();
                ctx.moveTo(toXY(coastline[0].lon, coastline[0].lat, r.width, r.height).x, toXY(coastline[0].lon, coastline[0].lat, r.width, r.height).y);
                coastline.forEach(p => ctx.lineTo(toXY(p.lon, p.lat, r.width, r.height).x, toXY(p.lon, p.lat, r.width, r.height).y));
                ctx.lineTo(toXY(1,52, r.width, r.height).x, toXY(1,52, r.width, r.height).y); ctx.lineTo(toXY(-8,52, r.width, r.height).x, toXY(-8,52, r.width, r.height).y);
                ctx.closePath();
                ctx.moveTo(toXY(iow[0].lon, iow[0].lat, r.width, r.height).x, toXY(iow[0].lon, iow[0].lat, r.width, r.height).y);
                iow.forEach(p => ctx.lineTo(toXY(p.lon, p.lat, r.width, r.height).x, toXY(p.lon, p.lat, r.width, r.height).y));
                ctx.closePath();
            };

            ctx.save(); buildLand(); ctx.shadowColor = 'rgba(56,189,248,0.3)'; ctx.shadowBlur = 30*zoomLevel; ctx.fillStyle = '#1e293b'; ctx.fill();
            ctx.lineWidth = 3*zoomLevel; ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.stroke(); ctx.restore();
            ctx.save(); buildLand(); ctx.fillStyle = '#0f172a'; ctx.fill(); ctx.restore();
            ctx.save(); buildLand(); ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(16,185,129,0.4)'; ctx.stroke(); ctx.restore();

            // Lighthouses (Sweeping / Pulsing)
            lighthouses.forEach(lh => {
                const pt = toXY(lh.lon, lh.lat, r.width, r.height);
                const time = Date.now(); const p = (time % lh.period) / lh.period;
                const activePulse = (p > 0.9 || p < 0.1);

                ctx.save();
                if (activePulse) { ctx.beginPath(); ctx.arc(pt.x, pt.y, 16*zoomLevel, 0, 2*Math.PI); ctx.fillStyle = lh.color; ctx.fill(); }
                const sweepAngle = (time / 1200) % (2 * Math.PI);
                ctx.beginPath(); ctx.moveTo(pt.x, pt.y);
                if (lh.hasSector) {
                    const actualAngle = lh.sectorStart + (Math.sin(time / 1000) + 1) / 2 * (lh.sectorEnd - lh.sectorStart);
                    ctx.arc(pt.x, pt.y, 50*zoomLevel, actualAngle - 0.2, actualAngle + 0.2);
                } else {
                    ctx.arc(pt.x, pt.y, 50*zoomLevel, sweepAngle - 0.25, sweepAngle + 0.25);
                }
                ctx.closePath();
                ctx.fillStyle = activePulse ? lh.color : "rgba(255, 255, 255, 0.05)"; ctx.fill();
                ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, 2*Math.PI); ctx.fillStyle = '#a855f7'; ctx.fill(); ctx.restore();
            });

            // Draw Ports and Name Tags
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            let fontSize = Math.max(9, Math.min(12, 8 * Math.sqrt(zoomLevel)));
            ctx.font = `600 ${fontSize}px -apple-system, sans-serif`;

            for (const key in mapNodes) {
                if (mapNodes[key].isPort) {
                    const pt = toXY(mapNodes[key].lon, mapNodes[key].lat, r.width, r.height);
                    
                    if (!pathNodes || !pathNodes.includes(key)) {
                        ctx.beginPath(); ctx.arc(pt.x, pt.y, 3.5, 0, 2*Math.PI);
                        ctx.fillStyle = 'rgba(100, 116, 139, 0.6)';
                        ctx.fill();
                    }

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = 4;
                    let shortName = mapNodes[key].name.split(' (')[0].replace(' Harbour', '').replace(' Entrance', '');
                    ctx.fillText(shortName, pt.x + 7, pt.y);
                    ctx.shadowBlur = 0;
                }
            }

            // Path Track
            if (pathNodes && pathNodes.length > 0) {
                ctx.beginPath();
                ctx.moveTo(toXY(mapNodes[pathNodes[0]].lon, mapNodes[pathNodes[0]].lat, r.width, r.height).x, toXY(mapNodes[pathNodes[0]].lon, mapNodes[pathNodes[0]].lat, r.width, r.height).y);
                pathNodes.forEach(id => ctx.lineTo(toXY(mapNodes[id].lon, mapNodes[id].lat, r.width, r.height).x, toXY(mapNodes[id].lon, mapNodes[id].lat, r.width, r.height).y));
                ctx.lineWidth = 3; ctx.strokeStyle = '#34d399'; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
                pathNodes.forEach((id, i) => {
                    const pt = toXY(mapNodes[id].lon, mapNodes[id].lat, r.width, r.height);
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, 6, 0, 7);
                    ctx.fillStyle = i===0 ? '#3b82f6' : (i===pathNodes.length-1 ? '#10b981' : '#64748b');
                    ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
                });
            }
        }

            document.getElementById('aiGuideContainer').classList.remove('fade-in');
        }

        function renderLoop() { drawVectorMap(currentRoutePath); requestAnimationFrame(renderLoop); }

        window.fetchAIPortGuide = function() {
            const box = document.getElementById('aiGuideContainer');
            box.classList.remove('hidden'); box.classList.add('fade-in');
            box.innerHTML = mapNodes[destSelect.value].offlineGuide || '<p class="italic text-slate-400 p-4 text-center">No detailed AI guide database mapped for this port yet.</p>';
        };

        window.swapPorts = function() {
            const t = depSelect.value; depSelect.value = destSelect.value; destSelect.value = t;
            localStorage.setItem('almanac_ios_dep', depSelect.value); localStorage.setItem('almanac_ios_dest', destSelect.value);
            update();
        };

        function handleTapSelect(clientX, clientY) {
            const r = canvas.getBoundingClientRect();
            const w = r.width; const h = r.height;
            const cx = clientX - r.left; const cy = clientY - r.top;
            const x = (cx - panX - w/2)/zoomLevel + w/2;
            const y = (cy - panY - h/2)/zoomLevel + h/2;
            const lon = -6.6 + (x/w)*6.1; const lat = 49.7 + (1 - y/h)*1.3;
            
            let closest = null; let minD = 0.15;
            for (const key in mapNodes) {
                if (!mapNodes[key].isPort) continue;
                const d = Math.hypot(mapNodes[key].lon - lon, mapNodes[key].lat - lat);
                if (d < minD) { minD = d; closest = key; }
            }
            if (closest && depSelect.value !== closest) {
                destSelect.value = closest; localStorage.setItem('almanac_ios_dest', closest); update();
            }
        }

        depSelect.addEventListener('change', () => { localStorage.setItem('almanac_ios_dep', depSelect.value); update(); });
        destSelect.addEventListener('change', () => { localStorage.setItem('almanac_ios_dest', destSelect.value); update(); });
        speedSlider.addEventListener('input', () => { speedLabel.innerText = parseFloat(speedSlider.value).toFixed(1) + " KTS"; update(); });

        canvas.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; dragDistance = 0; });
        canvas.addEventListener('mousemove', (e) => { 
            if (isDragging) { panX = e.clientX - startX; panY = e.clientY - startY; dragDistance += Math.hypot(e.clientX - startX - panX, e.clientY - startY - panY); } 
            
            const r = canvas.getBoundingClientRect();
            const w = r.width; const h = r.height;
            const cx = e.clientX - r.left; const cy = e.clientY - r.top;
            const x = (cx - panX - w/2)/zoomLevel + w/2;
            const y = (cy - panY - h/2)/zoomLevel + h/2;
            const lon = (-6.6 + (x/w)*6.1).toFixed(3); const lat = (49.7 + (1 - y/h)*1.3).toFixed(3);
            document.getElementById('coordinateReadout').innerText = `${lat}° N, ${lon}° W`;
        });
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('click', (e) => { if (dragDistance < 5) handleTapSelect(e.clientX, e.clientY); });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault(); const zf = 1.1; const oldZ = zoomLevel;
            zoomLevel = e.deltaY < 0 ? Math.min(zoomLevel * zf, 15) : Math.max(zoomLevel / zf, 0.8);
            const mx = e.clientX - canvas.getBoundingClientRect().left; const my = e.clientY - canvas.getBoundingClientRect().top;
            panX = mx - (mx - panX) * (zoomLevel / oldZ); panY = my - (my - panY) * (zoomLevel / oldZ);
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) { isTouchDragging = true; lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY; touchDragDistance = 0; }
            else if (e.touches.length === 2) { isTouchDragging = false; tpCache = [e.touches[0], e.touches[1]]; }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isTouchDragging && e.touches.length === 1) {
                panX += e.touches[0].clientX - lastTouchX; panY += e.touches[0].clientY - lastTouchY;
                touchDragDistance += Math.hypot(e.touches[0].clientX - lastTouchX, e.touches[0].clientY - lastTouchY);
                lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2 && tpCache.length === 2) {
                const oldDist = Math.hypot(tpCache[0].clientX - tpCache[1].clientX, tpCache[0].clientY - tpCache[1].clientY);
                const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const oldZ = zoomLevel; zoomLevel = Math.max(0.8, Math.min(15.0, zoomLevel * (newDist / oldDist)));
                tpCache = [e.touches[0], e.touches[1]];
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (isTouchDragging && touchDragDistance < 10 && e.changedTouches.length > 0) handleTapSelect(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            isTouchDragging = false; tpCache = []; 
        });

        update(); renderLoop();
    </script>
</body>
</html>
